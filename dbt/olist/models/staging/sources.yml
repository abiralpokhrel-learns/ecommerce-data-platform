version: 2

sources:
  - name: raw
    description: "Raw Olist e-commerce data ingested from CSVs"
    database: warehouse
    schema: raw
    tables:
      - name: customers
        description: "Customer master data"
        columns:
          - name: customer_id
            description: "Unique customer identifier"
            tests:
              - unique
              - not_null
      - name: orders
        description: "Order header data"
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
      - name: order_items
        description: "Order line items"
      - name: order_payments
        description: "Payment transactions per order"
      - name: order_reviews
        description: "Customer reviews"
      - name: products
        description: "Product catalog"
        columns:
          - name: product_id
            tests:
              - unique
              - not_null
      - name: sellers
        description: "Seller master data"
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null
      - name: geolocation
        description: "Geolocation lookup data (zip code prefix to lat/long)"
      - name: product_category_translation
        description: "Portuguese to English product category mapping"