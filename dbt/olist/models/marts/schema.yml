version: 2

models:
  - name: dim_dates
    columns:
      - name: date_sk
        tests:
          - unique
          - not_null
      - name: date_day
        tests:
          - unique
          - not_null

  - name: dim_customers
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null

  - name: dim_sellers
    columns:
      - name: seller_sk
        tests:
          - unique
          - not_null

  - name: fct_orders
    columns:
      - name: order_sk
        tests:
          - unique
          - not_null
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_sk
      - name: order_status
        tests:
          - not_null
      - name: payment_total
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: fct_order_items
    columns:
      - name: order_item_sk
        tests:
          - unique
          - not_null
      - name: product_sk
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_sk
      - name: seller_sk
        tests:
          - relationships:
              to: ref('dim_sellers')
              field: seller_sk